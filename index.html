<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sensory Magic - 癒しアプリ</title>
    <meta name="description" content="赤ちゃんや子供が泣き止む、触って癒される魔法の感覚アプリ">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="start-overlay" class="overlay">
        <div class="overlay-content">
            <h1>Sensory Magic ✨</h1>
            <p>画面をタッチして、魔法の色と音を楽しんでね</p>
            <button id="start-btn">はじめる</button>
        </div>
    </div>
    
    <canvas id="canvas"></canvas>

    <div id="controls">
        <button id="mode-btn" class="icon-btn" aria-label="モード変更">✨</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
